name: Release

on:
  push:
    tags:
      - 'v*'

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'
  OSCAR_DIR: 'web/oscar-viewer'
  DIST_DIR: 'build/distributions'

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure tag is on main branch
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "::error::Tag ${{ github.ref_name }} is not on the main branch. Tags must be created on main."
            exit 1
          fi

      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check build.gradle version matches tag
        run: |
          gradle_version=$(grep -oP 'version\s*=\s*"\K[^"]+' build.gradle)
          tag_version="${{ steps.tag.outputs.version }}"
          if [ "$gradle_version" != "$tag_version" ]; then
            echo "::error::build.gradle version ($gradle_version) does not match tag version ($tag_version)"
            exit 1
          fi
          echo "Version check passed: $gradle_version"

      - name: Check config.json deploymentName matches tag
        run: |
          tag_version="${{ steps.tag.outputs.version }}"
          expected="OSCAR $tag_version"
          actual=$(grep -oP '"deploymentName"\s*:\s*"\K[^"]+' dist/config/standard/config.json)
          if [ "$actual" != "$expected" ]; then
            echo "::error::config.json deploymentName ($actual) does not match expected ($expected)"
            exit 1
          fi
          echo "deploymentName check passed: $actual"

      - name: Check no pgdata in dist/release/postgis
        run: |
          if [ -d "dist/release/postgis/pgdata" ]; then
            echo "::error::pgdata directory exists in dist/release/postgis — remove it before releasing"
            exit 1
          fi
          echo "No pgdata directory found — check passed"

  build:
    name: Build Release
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: ${{ env.OSCAR_DIR }}/package-lock.json

      - name: Install oscar-viewer dependencies
        working-directory: ${{ env.OSCAR_DIR }}
        run: npm install

      - name: Build oscar-viewer
        working-directory: ${{ env.OSCAR_DIR }}
        run: npm run build

      - name: Build with Gradle
        run: ./gradlew build -x test -x osgi

      - name: Package source with submodules
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          TAG="${GITHUB_REF_NAME}"
          SOURCE_DIR="${REPO_NAME}-${TAG}"
          mkdir -p /tmp/source-archive
          # Copy entire repo including submodules (already checked out recursively)
          rsync -a --exclude='.git' --exclude='build' . "/tmp/source-archive/${SOURCE_DIR}"
          cd /tmp/source-archive
          zip -r "${GITHUB_WORKSPACE}/${DIST_DIR}/${SOURCE_DIR}-source.zip" "${SOURCE_DIR}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ env.DIST_DIR }}/oscar-*.zip
            ${{ env.DIST_DIR }}/*-source.zip
